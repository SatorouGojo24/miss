<section class="py-24 bg-gray-50 w-full" id="faq">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <div class="text-center mb-16" data-aos="fade-up">
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight sm:text-4xl">
        Preguntas Frecuentes
      </h2>
      <p class="mt-4 text-lg text-gray-500">
        Resolvemos tus dudas para que te sientas con total tranquilidad.
      </p>
    </div>

    <div class="space-y-4">
      
      <div *ngFor="let faq of faqs; let i = index" 
           data-aos="fade-up"
           [attr.data-aos-delay]="i * 100"
           class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden transition-all duration-300 hover:shadow-md">
        
        <button (click)="toggleFaq(i)" class="w-full px-6 py-5 text-left flex justify-between items-center focus:outline-none hover:bg-pink-50 transition-colors">
          <span class="font-bold text-gray-800 text-lg pr-4">{{ faq.pregunta }}</span>
          
          <span class="text-pink-500 text-3xl font-light transform transition-transform duration-300"
                [ngClass]="{'rotate-45': faq.abierto}">
            +
          </span>
        </button>
        
        <div class="px-6 pb-5 text-gray-600 bg-white" *ngIf="faq.abierto">
          <p class="pt-4 border-t border-gray-100 text-base leading-relaxed">{{ faq.respuesta }}</p>
        </div>
        
      </div>

    </div>
  </div>
</section>
